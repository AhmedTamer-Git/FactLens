<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>FactLens — Sign In</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
    <link rel="stylesheet" href="../css/variables.css" />
    <link rel="stylesheet" href="../css/auth.css" />
    <link rel="stylesheet" href="../css/responsive.css" />
    <link rel="icon" href="../assets/favicon.png" type="image/png">
</head>
<body class="auth-body">
    <a href="home.html" class="auth-back-home">⬡ FactLens</a>

    <div class="auth-card">
        <div class="auth-header">
            <h1>Welcome Back</h1>
            <p>Sign in to continue verifying news</p>
        </div>

        <div class="auth-toggle">
            <button class="toggle-btn active" onclick="location.href='login.html'">Sign In</button>
            <button class="toggle-btn" onclick="location.href='sign_up.html'">Sign Up</button>
        </div>

        <form id="loginForm" novalidate>
            <div class="form-group">
                <label>Email or Username</label>
                <div class="input-wrap">
                    <i class="fa-regular fa-envelope input-icon"></i>
                    <input type="text" id="usernameField" placeholder="Enter email or username" required />
                </div>
            </div>

            <div class="form-group">
                <label>Password</label>
                <div class="input-wrap">
                    <i class="fa-solid fa-lock input-icon"></i>
                    <input type="password" id="passwordField" placeholder="Password" required />
                    <button type="button" class="toggle-pw" onclick="togglePw('passwordField',this)">
                        <i class="fa-regular fa-eye"></i>
                    </button>
                </div>
            </div>

            <div class="form-row">
                <label class="check-label">
                    <input type="checkbox" id="rememberMe" />
                    <span>Remember me</span>
                </label>
                <a href="reset_password.html" class="link-gold">Forgot password?</a>
            </div>

            <p id="loginError" class="form-error"></p>

            <button type="submit" class="btn-auth" id="loginBtn">Sign In</button>
        </form>

        <div class="auth-divider"><span>or</span></div>

        <a href="javascript:void(0)" class="btn-google" id="googleBtn">
            <svg width="20" height="20" viewBox="0 0 48 48"><path fill="#EA4335" d="M24 9.5c3.5 0 6.6 1.2 9 3.2l6.7-6.7C35.8 2.5 30.3 0 24 0 14.6 0 6.6 5.5 2.7 13.5l7.8 6C12.4 13.4 17.8 9.5 24 9.5z" /><path fill="#4285F4" d="M46.5 24.5c0-1.6-.1-3.1-.4-4.5H24v8.5h12.7c-.6 3-2.3 5.5-4.9 7.2l7.6 5.9c4.4-4.1 7.1-10.1 7.1-17.1z" /><path fill="#FBBC05" d="M10.5 28.5a14.5 14.5 0 0 1 0-9l-7.8-6A23.9 23.9 0 0 0 0 24c0 3.8.9 7.4 2.7 10.5l7.8-6z" /><path fill="#34A853" d="M24 48c6.3 0 11.6-2.1 15.4-5.6l-7.6-5.9c-2.1 1.4-4.8 2.2-7.8 2.2-6.2 0-11.5-4-13.4-9.4l-7.9 6.1C6.5 42.4 14.6 48 24 48z" /></svg>
            Continue with Google
        </a>

        <p class="auth-footer">Don't have an account? <a href="sign_up.html" class="link-gold">Sign Up</a></p>
    </div>

    <script src="../js/shared.js"></script>
    <script src="../js/login.js"></script>
</body>
</html>
