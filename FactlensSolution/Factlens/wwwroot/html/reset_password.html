<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>FactLens — Reset Password</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
    <link rel="stylesheet" href="../css/variables.css" />
    <link rel="stylesheet" href="../css/auth.css" />
    <link rel="stylesheet" href="../css/responsive.css" />
    <link rel="icon" href="../assets/favicon.png" type="image/png">
</head>
<body class="auth-body">

    <a href="home.html" class="auth-back-home">⬡ FactLens</a>

    <!-- Forgot Password Card -->
    <div class="auth-card" id="forgotCard">
        <a href="login.html" style="display:inline-flex;align-items:center;gap:6px;color:var(--gray-500);font-size:14px;margin-bottom:20px;">
            <i class="fa-solid fa-arrow-left"></i> Back to Sign In
        </a>
        <div class="auth-lock"><i class="fa-solid fa-lock"></i></div>
        <div class="auth-header">
            <h1>Reset Password</h1>
            <p>Enter your email and we'll send you a reset link</p>
        </div>
        <form id="forgotForm" novalidate>
            <div class="form-group">
                <div class="input-wrap">
                    <i class="fa-regular fa-envelope input-icon"></i>
                    <input type="email" id="forgotEmail" placeholder="Email address" required />
                </div>
            </div>
            <p id="forgotError" class="form-error"></p>
            <p id="forgotSuccess" class="form-success"></p>
            <button type="submit" class="btn-auth" id="forgotBtn">Send Reset Link</button>
        </form>
        <p class="auth-footer">Remember your password? <a href="login.html" class="link-gold">Sign In</a></p>
    </div>

    <!-- Reset Password Card -->
    <div class="auth-card" id="resetCard" style="display:none;">
        <div class="auth-lock"><i class="fa-solid fa-key"></i></div>
        <div class="auth-header">
            <h1>New Password</h1>
            <p>Enter your new password below</p>
        </div>
        <form id="resetForm" novalidate>
            <div class="form-group">
                <label>New Password</label>
                <div class="input-wrap">
                    <i class="fa-solid fa-lock input-icon"></i>
                    <input type="password" id="newPw" placeholder="New password" required />
                    <button type="button" class="toggle-pw" onclick="togglePw('newPw',this)"><i class="fa-regular fa-eye"></i></button>
                </div>
            </div>
            <div class="form-group">
                <label>Confirm Password</label>
                <div class="input-wrap">
                    <i class="fa-solid fa-lock input-icon"></i>
                    <input type="password" id="confirmPw" placeholder="Confirm password" required />
                </div>
            </div>
            <p id="resetError" class="form-error"></p>
            <p id="resetSuccess" class="form-success"></p>
            <button type="submit" class="btn-auth" id="resetBtn">Reset Password</button>
        </form>
    </div>

    <script src="../js/shared.js"></script>
    <script src="../js/reset_password.js"></script>
</body>
</html>
