<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>FactLens Admin — Dashboard</title>
    <link rel="stylesheet" href="../../css/variables.css" />
    <link rel="stylesheet" href="../../css/components.css" />
    <link rel="stylesheet" href="../../css/admin.css" />
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4/dist/chart.umd.min.js"></script>
    <link rel="stylesheet" href="../../css/responsive.css" />
    <link rel="icon" href="../../assets/favicon.png" type="image/png">
</head>
<body>
    <div class="admin-layout">

        <!-- Sidebar -->
        <aside class="admin-sidebar">
            <div class="sidebar-brand">Fact<strong>Lens</strong> <span class="sidebar-badge">Admin</span></div>
            <nav class="sidebar-nav">
                <a class="sidebar-link active" href="dashboard.html"><span class="link-icon">📊</span> Dashboard</a>
                <a class="sidebar-link" href="requests.html"><span class="link-icon">📋</span> AI Requests</a>
                <a class="sidebar-link" href="verdicts.html"><span class="link-icon">🔬</span> Verdicts</a>
                <a class="sidebar-link" href="feedback.html"><span class="link-icon">💬</span> Feedback</a>
                <a class="sidebar-link" href="../home.html"><span class="link-icon">🏠</span> Back to Site</a>
            </nav>
            <div class="sidebar-footer">
                <div class="sidebar-user" id="sidebarUser">—</div>
                <button class="sidebar-logout" onclick="Auth.logout()">Sign Out</button>
            </div>
        </aside>

        <!-- Main -->
        <main class="admin-main">
            <div class="admin-topbar">
                <h2>Dashboard Overview</h2>
                <span id="lastUpdated" style="font-size:13px;color:var(--gray-400);">Loading…</span>
            </div>

            <div class="admin-content">
                <!-- Stats -->
                <div class="stats-grid" id="statsGrid">
                    <div class="stat-card"><div class="stat-label">Loading…</div><div class="stat-value">—</div></div>
                </div>

                <!-- Charts Row -->
                <div style="display:grid;grid-template-columns:1fr 1fr;gap:24px;margin-bottom:24px;">
                    <!-- Verdict Chart -->
                    <div class="admin-section">
                        <div class="admin-section-header"><h3>Verdict Distribution (Last 30d)</h3></div>
                        <div class="admin-section-body">
                            <div class="chart-wrap"><canvas id="verdictChart" height="260"></canvas></div>
                        </div>
                    </div>

                    <!-- Daily Requests (stub) -->
                    <div class="admin-section">
                        <div class="admin-section-header"><h3>Quick Stats</h3></div>
                        <div class="admin-section-body" id="quickStats" style="font-size:15px;line-height:2;color:var(--gray-700);">
                            Loading…
                        </div>
                    </div>
                </div>

                <!-- Recent Requests Table -->
                <div class="admin-section">
                    <div class="admin-section-header">
                        <h3>Recent AI Requests</h3>
                        <a href="requests.html" style="font-size:13px;color:var(--gold-dark);font-weight:600;">View all →</a>
                    </div>
                    <div class="admin-section-body">
                        <div class="admin-table-wrap">
                            <table class="admin-table">
                                <thead>
                                    <tr><th>ID</th><th>Input</th><th>Verdict</th><th>Score</th><th>Status</th><th>Duration</th><th>Time</th></tr>
                                </thead>
                                <tbody id="recentTable"><tr><td colspan="7" style="text-align:center;padding:40px;color:var(--gray-400);">Loading…</td></tr></tbody>
                            </table>
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script src="../../js/shared.js"></script>
    <script src="../../js/admin/dashboard.js"></script>
    <script src="../../js/admin/admin-responsive.js"></script>
</body>
</html>
